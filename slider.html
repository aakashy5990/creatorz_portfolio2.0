<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;

      }
      body{
        background-color: black;
      }
      .box_text_slider_main {
        background-color: var(--text-b-color);
      }

      .first_slider,
      .second_slider,
      .third_slider {
        width: 100%;
      }

      .slider {
        margin: auto;
        overflow: hidden;
        position: relative;
        width: 100%;
        transition: width 0.5s ease, height 0.5s ease;
      }

      .slider .slide-track {
        animation: scroll 8s linear infinite reverse;
        display: flex;
        width: calc(350px * 18);
        /* Adjust this based on the number of slides */
      }

      .slider .slide-track:hover {
        animation-play-state: paused;
      }

      .slider .second-slide-track {
        animation: scroll 80s linear infinite;
        display: flex;
        width: calc(350px * 18);
        /* Adjust this based on the number of slides */
      }

      .slider .second-slide-track:hover {
        animation-play-state: paused;
      }

      .slide {
        width: 350px;
        height: 210px;
        background-color: white;
        margin: 1rem;
        transition: width 0.5s ease, height 0.5s ease;
      }

      @keyframes scroll {
        0% {
          transform: translateX(0);
        }

        100% {
          transform: translateX(calc(-350px * 9));
          /* Adjust this based on the number of slides */
        }
      }

      .marquee-w {
        position: relative;
        display: block;
        height: 140px;
        overflow: hidden;
      }

      .marquee {
        position: absolute;
        display: block;
        margin: auto auto;
        white-space: nowrap;
        overflow: hidden;
      }

      .marquee span {
        display: inline-block;
        padding-left: 100%;
        text-align: center;
        color: rgb(204 42 249);
        font-family: "Clash Display", sans-serif;
        font-weight: var(--font-weight-semibold);
        white-space: nowrap;
        line-height: 140px;
        font-size: 8rem;
        animation: marquee 20s linear infinite;
      }

      .marquee2 span {
        animation-delay: 10s;
      }

      @keyframes marquee {
        0% {
          transform: translate(0, 0);
        }

        100% {
          transform: translate(-100%, 0);
        }
      }
    </style>
  </head>
  <body>
    <div class="box_text_slider_main">
      <div class="first_slider">
        <div class="slider">
          <div class="slide-track">
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
          </div>
        </div>
      </div>

      <div class="marquee-w">
        <div class="marquee">
          <span
            >Quality is worth the time. Quality is worth the
            time.&nbsp;&nbsp;</span
          >
        </div>
        <div class="marquee marquee2">
          <span
            >Quality is worth the time. Quality is worth the
            time.&nbsp;&nbsp;</span
          >
        </div>
      </div>

      <div class="third_slider">
        <div class="slider">
          <div class="slide-track">
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
