<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: black;
        margin: 0 0;
      }

      .first_slider, .second_slider, .third_slider {
        width: 100%;
      }

      .slider {
        margin: auto;
        overflow: hidden;
        position: relative;
        width: 100%;
        transition: width 0.5s ease, height 0.5s ease;
      }

      .slider .slide-track {
        animation: scroll 80s linear infinite reverse;
        display: flex;
        width: calc(300px * 18); /* Adjust this based on the number of slides */
      }

      .slider .slide-track:hover {
        animation-play-state: paused;
      }

      .slider .second-slide-track {
        animation: scroll 80s linear infinite;
        display: flex;
        width: calc(300px * 18); /* Adjust this based on the number of slides */
      }

      .slider .second-slide-track:hover {
        animation-play-state: paused;
      }

      .slide {
        width: 300px;
        height: 180px;
        background-color: white;
        margin: 1rem;
        transition: width 0.5s ease, height 0.5s ease;
      }

      @keyframes scroll {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(calc(-300px * 9)); /* Adjust this based on the number of slides */
        }
      }
    </style>
  </head>
  <body>
    <div class="first_slider">
      <div class="slider">
        <div class="slide-track">
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
        </div>
      </div>
    </div>
    <div class="second_slider">
      <div class="slider">
        <div class="second-slide-track">
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
        </div>
      </div>
    </div>
    <div class="third_slider">
      <div class="slider">
        <div class="slide-track">
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
          <div class="slide"></div>
        </div>
      </div>
    </div>
  </body>
</html>
