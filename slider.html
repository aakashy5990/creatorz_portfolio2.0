<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .slider {
        margin: auto;
        overflow: hidden;
        position: relative;
        width: 100%;
        height: 400px;
        transition: width 0.5s ease, height 0.5s ease;
      }

      .slider::after {
        right: 0;
        top: 0;
        -webkit-transform: rotateZ(180deg);
        transform: rotateZ(180deg);
      }

      .slider::before {
        left: 0;
        top: 0;
      }

      .slider .slide-track {
        animation: scroll 80s linear infinite;
        display: flex;
        width: calc(300px * 18);
      }

      .slider .slide-track:hover {
        animation-play-state: paused;
      }

      .slide {
        width: 300px;
        height: 300px;
        background-color: red;
        margin: 1rem;
        transition: width 0.5s ease, height 0.5s ease;
      }


      @keyframes scroll {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(calc(-300px * 9));
        }
      }
    </style>
  </head>
  <body>
    <div class="slider">
      <div class="slide-track">
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
      </div>
    </div>
  </body>
</html>
